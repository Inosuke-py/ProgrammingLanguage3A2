{% extends "quiz/base.html" %}

{% block title %}Logout | PRAXIS{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[calc(100vh-66px)] max-w-xl items-center px-4 py-10 sm:px-6">
    <div class="w-full rounded-lg border border-zinc-200 bg-white p-6 text-center shadow-sm">
        <h1 class="text-2xl font-bold text-zinc-950">Logout</h1>
        <p class="mt-2 text-sm leading-6 text-zinc-600">Are you sure you want to leave your PRAXIS session?</p>
        <form method="post" action="{% url 'account_logout' %}" class="mt-6 flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'quiz:home' %}" class="rounded-lg border border-zinc-300 px-4 py-2 text-sm font-semibold text-zinc-700 hover:bg-zinc-100">Cancel</a>
            <button type="submit" class="rounded-lg bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-800">Logout</button>
        </form>
    </div>
</section>
{% endblock %}
